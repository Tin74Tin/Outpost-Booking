<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outpost – Clubhouse Booking</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F0F4F8;color:#1a1a1a;min-height:100vh;}
.op-hdr{background:#4E8B7A;padding:18px 24px 16px;}
.op-logo{color:#fff;font-size:24px;font-weight:500;letter-spacing:.12em;}
.op-sub{color:rgba(255,255,255,.55);font-size:14px;letter-spacing:.18em;text-transform:uppercase;margin-top:4px;}
.op-nav{background:#3D7A6A;display:flex;padding:0 24px;border-top:1px solid rgba(255,255,255,.12);}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.55);font-family:inherit;font-size:14px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:13px 18px 11px;cursor:pointer;}
.tab.active{color:#fff;border-bottom-color:#B8E0D6;}
.tab:hover:not(.active){color:rgba(255,255,255,.85);}
.op-body{max-width:960px;margin:0 auto;padding:20px 24px;}
.grid2{display:grid;grid-template-columns:290px 1fr;gap:16px;align-items:start;}
.card{background:#fff;border:1px solid #E2E8F0;border-radius:12px;padding:18px;}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cm-lbl{font-size:17px;font-weight:500;}
.cbtn{background:none;border:1px solid #E2E8F0;border-radius:8px;width:32px;height:32px;cursor:pointer;color:#666;display:flex;align-items:center;justify-content:center;font-size:17px;}
.cbtn:hover{background:#F7FAFC;}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.dow{text-align:center;font-size:12px;font-weight:500;color:#999;padding:4px 0 6px;}
.d{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:14px;cursor:pointer;border:1.5px solid transparent;position:relative;color:#1a1a1a;user-select:none;}
.d.emp,.d.past{pointer-events:none;}
.d.past{color:#CCC;}
.d.today:not(.sel){border-color:#4E8B7A;color:#3D7A6A;font-weight:600;}
.d:hover:not(.past):not(.emp):not(.sel){background:#EBF5F2;color:#3D7A6A;}
.d.sel{background:#4E8B7A;color:#fff;font-weight:600;}
.d.dot::after{content:'';position:absolute;bottom:3px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:#4E8B7A;}
.d.sel.dot::after{background:rgba(255,255,255,.6);}
.leg{display:flex;align-items:center;gap:6px;margin-top:12px;font-size:13px;color:#999;}
.dot-sm{width:7px;height:7px;border-radius:50%;background:#4E8B7A;flex-shrink:0;}
